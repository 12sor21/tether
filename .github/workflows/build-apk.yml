name: Build Tether APK

# Builds a debug APK in the cloud on every push, and on manual trigger.
# Download it from the run's "Artifacts" section. No local Linux needed.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          workdir: .
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tether-debug-apk
          path: ${{ steps.buildozer.outputs.filename }}

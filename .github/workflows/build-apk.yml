name: Build Tether APK

# Builds a debug APK directly on the Ubuntu runner (no third-party Docker action).
# Download it from the finished run's "Artifacts" section.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to publish a Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            automake build-essential ccache gettext libltdl-dev

      - name: Install Buildozer + Cython
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer cython

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-

      - name: Cache Buildozer project dir
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-project-

      - name: Accept Android SDK licenses
        run: yes | buildozer android debug || true
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Build debug APK
        run: buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: tether-debug-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Publish APK to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug build
          files: bin/*.apk
